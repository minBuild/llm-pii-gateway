# Presidio NLP 엔진 설정 — 한국어 spaCy (DESIGN §6.6).
# 검증됨(spaCy 3.8.13 / ko_core_news_sm 3.8.0): NER 라벨 = DT, LC, OG, PS, QT, TI.
#   "김민수 고객이 서울시 강남구로 이사" → 김민수=PS, 서울시=LC. 아래 PS→PERSON, LC→LOCATION 매핑 확정.
#   (라벨셋은 sm/md/lg 동일. 운영 정확도는 lg 권장 — 모델만 교체하면 됨.)
nlp_engine_name: spacy
models:
  - lang_code: ko
    model_name: ko_core_news_lg
ner_model_configuration:
  model_to_presidio_entity_mapping:
    PS: PERSON        # 인물 → PERSON
    LC: LOCATION      # 지명/주소 → LOCATION
    OG: ORGANIZATION  # 기관(마스킹 대상 아님, 참고용)
  labels_to_ignore:
    - O
  low_confidence_score_multiplier: 1.0
