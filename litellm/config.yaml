model_list:
  - model_name: claude-opus-4-8            # 게이트웨이가 노출할 이름
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: gpt-4o                      # 예시 — 실제 사용할 모델로 교체
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: mock-model                  # 통합테스트 전용 (Phase 2, fake upstream)
    litellm_params:
      model: openai/mock-model
      api_key: "fake-key"
      api_base: http://fake-upstream:9000/v1

litellm_settings:
  drop_params: true
  turn_off_message_logging: true            # 콜백에 메시지 원문 전달 금지

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_prompts_in_spend_logs: false        # spend 로그에 프롬프트 저장 금지

guardrails:
  - guardrail_name: kpii
    litellm_params:
      guardrail: custom_guardrails.kpii_guardrail.KoreanPIIGuardrail
      mode: pre_call            # 요청 전 훅. 응답/스트리밍 복원은 Phase 3
      default_on: true          # 모든 요청에 강제 (요청별 해제 불가)
      policy_path: /app/policies/default.yaml
# NOTE(§9-1): guardrails 스키마(mode/default_on/guardrail 경로)는 라이브 프록시 1.93.0 에서
# 최종 확인 필요. 클래스/훅 시그니처는 실제 소스로 검증 완료(docs/NOTES.md).
