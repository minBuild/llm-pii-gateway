model_list:
  - model_name: claude-opus-4-8            # 게이트웨이가 노출할 이름
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: gpt-4o                      # 예시 — 실제 사용할 모델로 교체
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: mock-model                  # 통합테스트 전용 (Phase 2, fake upstream)
    litellm_params:
      model: openai/mock-model
      api_key: "fake-key"
      api_base: http://fake-upstream:9000/v1

litellm_settings:
  drop_params: true
  turn_off_message_logging: true            # 콜백에 메시지 원문 전달 금지

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_prompts_in_spend_logs: false        # spend 로그에 프롬프트 저장 금지

guardrails:
  - guardrail_name: kpii
    litellm_params:
      guardrail: custom_guardrails.kpii_guardrail.KoreanPIIGuardrail
      mode: [pre_call, post_call]   # pre=마스킹/차단, post=응답 복원. 둘 다 있어야 복원 발동(라이브 검증)
      default_on: true              # 모든 요청에 강제 (요청별 해제 불가)
      policy_path: /app/policies/default.yaml
# guardrails 스키마·훅·복원 동작은 라이브 프록시 1.93.0 에서 E2E 검증 완료(docs/NOTES.md).
# custom_guardrails/ 는 이 config 와 같은 디렉터리에 있어야 함(litellm get_instance_fn 이
# config 디렉터리 기준으로 로드). 도커에선 /app/ 에 함께 위치.
